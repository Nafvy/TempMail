<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NafvyMail - Liquid Temp Email</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-highlight: rgba(255, 255, 255, 0.2);
            --accent: #00f2fe;
            --accent-glow: rgba(0, 242, 254, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0f172a;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }

        /* Ambient Liquid Animation */
        .ambient-blob {
            position: fixed;
            width: 50vw;
            height: 50vw;
            background: linear-gradient(135deg, #38bdf8, #8b5cf6);
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.2;
            animation: float 20s infinite alternate ease-in-out;
            z-index: -1;
        }

        @keyframes float {
            0% { transform: translate(-10%, -10%) scale(1); }
            100% { transform: translate(10%, 10%) scale(1.2); }
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            z-index: 1;
        }

        /* Glassmorphism Panels */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 1px 0 var(--glass-highlight);
        }

        /* Header Section */
        .header {
            text-align: center;
            margin-bottom: 1rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        /* Email Generator Section */
        .email-display-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .email-input-group {
            position: relative;
            width: 100%;
            max-width: 600px;
            display: flex;
            align-items: center;
        }

        .email-input-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.2rem 4rem 1.2rem 1.5rem;
            color: #fff;
            font-size: 1.5rem;
            font-family: monospace;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
        }

        .email-input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .btn-copy {
            position: absolute;
            right: 10px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 12px;
            padding: 0.8rem 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-copy:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .controls {
            display: flex;
            gap: 1rem;
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-action:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
        }

        /* Inbox Section */
        .inbox-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 1rem;
        }

        .inbox-header h2 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .message-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-height: 300px;
            overflow-y: auto;
        }

        .message-item {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid transparent;
            border-radius: 12px;
            padding: 1rem 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            display: grid;
            grid-template-columns: 200px 1fr 100px;
            gap: 1rem;
            align-items: center;
        }

        .message-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--glass-border);
        }

        .msg-sender { font-weight: 600; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .msg-subject { color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .msg-date { font-size: 0.85rem; color: #64748b; text-align: right; }

        .empty-inbox {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            font-style: italic;
        }

        /* Message Viewer */
        #message-viewer {
            display: none;
            margin-top: 1.5rem;
            border-top: 1px solid var(--glass-border);
            padding-top: 1.5rem;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .viewer-header {
            margin-bottom: 1.5rem;
            background: rgba(0,0,0,0.3);
            padding: 1.5rem;
            border-radius: 16px;
        }

        .viewer-body {
            background: #fff; /* White background for HTML emails to render correctly */
            color: #000;
            padding: 2rem;
            border-radius: 16px;
            min-height: 200px;
            overflow-x: auto;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-highlight); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="ambient-blob"></div>

    <div class="container">
        <div class="glass-panel">
            <div class="header">
                <h1>TempMail X</h1>
                <p style="color: var(--text-muted);">Terima email tanpa jejak, langsung dari browser Anda.</p>
            </div>

            <div class="email-display-wrapper">
                <div class="email-input-group">
                    <input type="text" id="email-address" readonly value="Memuat email...">
                    <button class="btn-copy" onclick="copyEmail()">Salin</button>
                </div>

                <div class="controls">
                    <button class="btn-action" onclick="generateNewEmail()">
                        🔄 Ganti Email
                    </button>
                    <button class="btn-action" onclick="checkInbox(true)">
                        📥 Refresh Manual
                    </button>
                </div>
            </div>
        </div>

        <div class="glass-panel">
            <div class="inbox-header">
                <h2><div class="status-dot" id="status-indicator"></div> Kotak Masuk</h2>
                <span id="auto-refresh-text" style="font-size: 0.9rem; color: var(--text-muted);">Auto-refresh: Aktif (10s)</span>
            </div>

            <ul class="message-list" id="inbox-list">
                <div class="empty-inbox">Menunggu email masuk...</div>
            </ul>

            <div id="message-viewer">
                <div class="viewer-header">
                    <h3 id="view-subject" style="margin-bottom: 0.5rem; color: #fff;">Subjek Pesan</h3>
                    <p id="view-sender" style="color: var(--text-muted); font-size: 0.9rem;">Dari: pengirim@example.com</p>
                </div>
                <div class="viewer-body" id="view-body">
                    </div>
                <button class="btn-action" style="margin-top: 1rem;" onclick="closeViewer()">Tutup Pesan</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://www.1secmail.com/api/v1/";
        let currentEmail = "";
        let currentLogin = "";
        let currentDomain = "";
        let checkInterval;

        // Inisialisasi Pertama
        window.onload = () => {
            generateNewEmail();
        };

        // Fungsi membuat email baru
        async function generateNewEmail() {
            const emailInput = document.getElementById('email-address');
            emailInput.value = "Membuat email...";
            
            try {
                const response = await fetch(`${API_BASE}?action=genRandomMailbox&count=1`);
                const data = await response.json();
                
                currentEmail = data[0];
                const parts = currentEmail.split('@');
                currentLogin = parts[0];
                currentDomain = parts[1];
                
                emailInput.value = currentEmail;
                
                // Reset Inbox & Viewer
                document.getElementById('inbox-list').innerHTML = '<div class="empty-inbox">Menunggu email masuk...</div>';
                closeViewer();

                // Mulai Auto Refresh
                clearInterval(checkInterval);
                checkInterval = setInterval(() => checkInbox(false), 10000);
                
            } catch (error) {
                console.error("Gagal membuat email:", error);
                emailInput.value = "Gagal terhubung ke API";
            }
        }

        // Fungsi cek inbox
        async function checkInbox(manual = false) {
            if (!currentLogin || !currentDomain) return;

            const indicator = document.getElementById('status-indicator');
            if (manual) indicator.style.backgroundColor = "#38bdf8"; // Warna biru saat manual refresh

            try {
                const response = await fetch(`${API_BASE}?action=getMessages&login=${currentLogin}&domain=${currentDomain}`);
                const messages = await response.json();
                
                const inboxList = document.getElementById('inbox-list');
                
                if (messages.length === 0) {
                    inboxList.innerHTML = '<div class="empty-inbox">Belum ada email masuk. Menunggu...</div>';
                } else {
                    inboxList.innerHTML = '';
                    messages.forEach(msg => {
                        const li = document.createElement('li');
                        li.className = 'message-item';
                        li.onclick = () => readMessage(msg.id);
                        li.innerHTML = `
                            <div class="msg-sender">${msg.from}</div>
                            <div class="msg-subject">${msg.subject || '(Tanpa Subjek)'}</div>
                            <div class="msg-date">${msg.date}</div>
                        `;
                        inboxList.appendChild(li);
                    });
                }
            } catch (error) {
                console.error("Gagal cek inbox:", error);
            } finally {
                if (manual) setTimeout(() => indicator.style.backgroundColor = "#10b981", 500); // Kembali hijau
            }
        }

        // Fungsi baca detail pesan
        async function readMessage(id) {
            const viewer = document.getElementById('message-viewer');
            const viewSubject = document.getElementById('view-subject');
            const viewSender = document.getElementById('view-sender');
            const viewBody = document.getElementById('view-body');

            viewBody.innerHTML = '<div style="text-align:center; padding: 2rem;">Memuat isi pesan...</div>';
            viewer.style.display = 'block';

            try {
                const response = await fetch(`${API_BASE}?action=readMessage&login=${currentLogin}&domain=${currentDomain}&id=${id}`);
                const data = await response.json();

                viewSubject.innerText = data.subject || '(Tanpa Subjek)';
                viewSender.innerText = `Dari: ${data.from}`;
                
                // Prioritaskan HTML, jika tidak ada fallback ke Text
                if (data.htmlBody) {
                    viewBody.innerHTML = data.htmlBody;
                } else if (data.textBody) {
                    viewBody.innerText = data.textBody;
                } else {
                    viewBody.innerHTML = '<div style="color: #64748b;">(Isi pesan kosong)</div>';
                }
            } catch (error) {
                console.error("Gagal membaca pesan:", error);
                viewBody.innerHTML = '<div style="color: #ef4444;">Gagal memuat isi pesan.</div>';
            }
        }

        // Fungsi tutup pesan
        function closeViewer() {
            document.getElementById('message-viewer').style.display = 'none';
        }

        // Fungsi salin ke clipboard
        function copyEmail() {
            const emailInput = document.getElementById('email-address');
            navigator.clipboard.writeText(emailInput.value).then(() => {
                alert('Alamat email tersalin!');
            });
        }

    </script>
</body>
</html>
