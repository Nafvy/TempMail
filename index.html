<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal TempMail</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #ffffff;
            --text-dim: #888888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .main-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
        }

        h1 {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 24px;
            text-transform: uppercase;
        }

        .email-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 16px;
            font-size: 18px;
            font-family: 'SF Mono', monospace;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            word-break: break-all;
        }

        .email-box:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--border);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button.outline {
            background: transparent;
            color: #fff;
            border: 1px solid var(--border);
        }

        button:hover {
            opacity: 0.8;
        }

        .inbox-title {
            margin-top: 40px;
            margin-bottom: 15px;
            font-size: 12px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #22c55e;
            border-radius: 50%;
        }

        .mail-list {
            list-style: none;
        }

        .mail-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            text-align: left;
            transition: transform 0.2s;
        }

        .mail-item:hover {
            transform: scale(1.02);
        }

        .mail-sender {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .mail-subject {
            font-size: 12px;
            color: var(--text-dim);
        }

        #message-content {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            padding: 40px 20px;
            display: none;
            z-index: 100;
            overflow-y: auto;
        }

        .close-btn {
            position: absolute;
            top: 20px; right: 20px;
            color: var(--text-dim);
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="main-card">
        <h1>Temporary Email</h1>
        <div class="email-box" id="email-display" onclick="copyText()">Memuat...</div>
        <div class="btn-group">
            <button onclick="generateMail()">Baru</button>
            <button class="outline" onclick="checkInbox()">Refresh</button>
        </div>
    </div>

    <div class="inbox-title">
        <div class="dot"></div> KOTAK MASUK
    </div>

    <div id="mail-list" class="mail-list">
        <div style="text-align: center; color: var(--text-dim); font-size: 12px; padding: 20px;">
            Tidak ada pesan
        </div>
    </div>
</div>

<div id="message-content">
    <span class="close-btn" onclick="closeMail()">Tutup (Esc)</span>
    <h2 id="view-subject" style="margin-bottom: 10px;"></h2>
    <p id="view-from" style="color: var(--text-dim); margin-bottom: 30px; font-size: 14px;"></p>
    <hr style="border: 0; border-top: 1px solid var(--border); margin-bottom: 30px;">
    <div id="view-body" style="line-height: 1.6;"></div>
</div>

<script>
    const API_KEY = "sk_Alee3jdfVSXxW6hR_gwP8jI58KgBqaXefUieupQ0ZHvW1xOLYFgWh1BRs1nUtuouRDbT9GPkMrR04yt64";
    const API_URL = "https://www.1secmail.com/api/v1/";
    let currentEmail = "";

    async function generateMail() {
        const res = await fetch(`${API_URL}?action=genRandomMailbox&count=1`);
        const data = await res.json();
        currentEmail = data[0];
        document.getElementById('email-display').innerText = currentEmail;
        document.getElementById('mail-list').innerHTML = `<div style="text-align: center; color: var(--text-dim); font-size: 12px; padding: 20px;">Menunggu pesan...</div>`;
    }

    async function checkInbox() {
        if (!currentEmail) return;
        const [user, domain] = currentEmail.split('@');
        const res = await fetch(`${API_URL}?action=getMessages&login=${user}&domain=${domain}`, {
            headers: { 'Authorization': `Bearer ${API_KEY}` } // Menyertakan API Key di Header
        });
        const mails = await res.json();
        
        const listContainer = document.getElementById('mail-list');
        if (mails.length === 0) {
            listContainer.innerHTML = `<div style="text-align: center; color: var(--text-dim); font-size: 12px; padding: 20px;">Belum ada pesan</div>`;
            return;
        }

        listContainer.innerHTML = '';
        mails.forEach(m => {
            const div = document.createElement('div');
            div.className = 'mail-item';
            div.onclick = () => readMail(m.id);
            div.innerHTML = `
                <div class="mail-sender">${m.from}</div>
                <div class="mail-subject">${m.subject}</div>
            `;
            listContainer.appendChild(div);
        });
    }

    async function readMail(id) {
        const [user, domain] = currentEmail.split('@');
        const res = await fetch(`${API_URL}?action=readMessage&login=${user}&domain=${domain}&id=${id}`);
        const data = await res.json();

        document.getElementById('view-subject').innerText = data.subject;
        document.getElementById('view-from').innerText = `Dari: ${data.from} | ${data.date}`;
        document.getElementById('view-body').innerHTML = data.htmlBody || data.textBody;
        document.getElementById('message-content').style.display = 'block';
    }

    function closeMail() {
        document.getElementById('message-content').style.display = 'none';
    }

    function copyText() {
        const text = document.getElementById('email-display').innerText;
        navigator.clipboard.writeText(text);
        alert('Disalin!');
    }

    document.addEventListener('keydown', (e) => { if(e.key === "Escape") closeMail(); });

    // Start
    generateMail();
    setInterval(checkInbox, 15000); // Auto refresh setiap 15 detik
</script>

</body>
</html>
